# ROS 2 ↔ Gazebo Harmonic Bridge Configuration
# Maps ROS topics to Gazebo transport topics for bidirectional communication.
#
# cmd_vel:     ROS → Gazebo  (ROS controller publishes, Gazebo DiffDrive subscribes)
# odom:        Gazebo → ROS  (Gazebo DiffDrive publishes, ROS nav stack subscribes)
# joint_states: Gazebo → ROS  (Gazebo JointStatePublisher publishes, ROS tf/state subscribes)

- ros_topic_name: "cmd_vel"
  gz_topic_name: "/model/vineyard_mower/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "odom"
  gz_topic_name: "/model/vineyard_mower/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "joint_states"
  gz_topic_name: "/world/empty/model/vineyard_mower/joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS
